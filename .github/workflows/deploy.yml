name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Existing Docker image tag to deploy. Leave blank to build and deploy the current main commit.
        required: false
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve-deploy-target:
    name: Resolve Deploy Target
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      should_build: ${{ steps.resolve.outputs.should_build }}

    steps:
      - name: Resolve image tag
        id: resolve
        run: |
          set -euo pipefail

          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build and Push Production Image
    runs-on: ubuntu-latest
    needs: resolve-deploy-target
    if: needs.resolve-deploy-target.outputs.should_build == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure production image name is configured
        env:
          PRODUCTION_IMAGE_NAME: ${{ vars.PRODUCTION_IMAGE_NAME }}
        run: |
          set -euo pipefail

          if [[ -z "${PRODUCTION_IMAGE_NAME}" ]]; then
            echo "Repository variable PRODUCTION_IMAGE_NAME is required."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          target: web
          platforms: linux/amd64
          build-args: |
            APP_ENV=production
          push: true
          tags: |
            ${{ vars.PRODUCTION_IMAGE_NAME }}:${{ needs.resolve-deploy-target.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - resolve-deploy-target
      - build-and-push
    if: |
      always() &&
      needs.resolve-deploy-target.result == 'success' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure deploy secrets are configured
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_APP_PATH: ${{ secrets.PRODUCTION_APP_PATH }}
          PRODUCTION_SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          for variable in PRODUCTION_HOST PRODUCTION_USER PRODUCTION_APP_PATH PRODUCTION_SSH_PRIVATE_KEY; do
            if [[ -z "${!variable}" ]]; then
              echo "Secret ${variable} is required."
              exit 1
            fi
          done

      - name: Configure SSH
        env:
          PRODUCTION_SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          PRODUCTION_SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf '%s\n' "$PRODUCTION_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          if [[ -n "${PRODUCTION_SSH_KNOWN_HOSTS}" ]]; then
            printf '%s\n' "$PRODUCTION_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
            chmod 644 ~/.ssh/known_hosts
          fi

      - name: Deploy release to production
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ secrets.PRODUCTION_USER }}
          PRODUCTION_PORT: ${{ secrets.PRODUCTION_PORT }}
          PRODUCTION_APP_PATH: ${{ secrets.PRODUCTION_APP_PATH }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DEPLOY_HEALTHCHECK_URL: ${{ vars.PRODUCTION_HEALTHCHECK_URL }}
          DEPLOY_READYCHECK_URL: ${{ vars.PRODUCTION_READYCHECK_URL }}
          IMAGE_TAG: ${{ needs.resolve-deploy-target.outputs.image_tag }}
          PRODUCTION_SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          port="${PRODUCTION_PORT:-22}"

          app_path_escaped=$(printf '%q' "$PRODUCTION_APP_PATH")
          image_tag_escaped=$(printf '%q' "$IMAGE_TAG")
          dockerhub_username_escaped=$(printf '%q' "$DOCKERHUB_USERNAME")
          dockerhub_token_escaped=$(printf '%q' "$DOCKERHUB_TOKEN")
          healthcheck_url_escaped=$(printf '%q' "${DEPLOY_HEALTHCHECK_URL:-}")
          readycheck_url_escaped=$(printf '%q' "${DEPLOY_READYCHECK_URL:-}")

          strict_host_key_checking="accept-new"
          if [[ -n "${PRODUCTION_SSH_KNOWN_HOSTS}" ]]; then
            strict_host_key_checking="yes"
          fi

          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "$port" \
            -o StrictHostKeyChecking="$strict_host_key_checking" \
            "${PRODUCTION_USER}@${PRODUCTION_HOST}" <<EOF
          set -euo pipefail
          cd ${app_path_escaped}
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          IMAGE_TAG=${image_tag_escaped} \
          DEPLOY_REGISTRY_USERNAME=${dockerhub_username_escaped} \
          DEPLOY_REGISTRY_TOKEN=${dockerhub_token_escaped} \
          DEPLOY_HEALTHCHECK_URL=${healthcheck_url_escaped} \
          DEPLOY_READYCHECK_URL=${readycheck_url_escaped} \
          bash ./scripts/deploy-production.sh
          EOF
