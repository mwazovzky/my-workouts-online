services:
  web:
    image: "${IMAGE_NAME}:${IMAGE_TAG}"
    env_file:
      - .env
    environment:
      PHP_FPM_UPSTREAM: "127.0.0.1:9000"
      APP_ROOT: /var/www/html/public
      DOMAIN_NAME: "${DOMAIN_NAME}"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    restart: unless-stopped

  worker:
    image: "${IMAGE_NAME}:${IMAGE_TAG}"
    user: "www-data"
    env_file:
      - .env
    command: ["php", "artisan", "queue:work", "--queue=default", "--sleep=3", "--tries=3", "--max-time=3600"]
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 -uroot"]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 10
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.8.1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/alloy/config.alloy:/etc/alloy/config.alloy:ro
    environment:
      LOKI_URL: ${LOKI_URL?LOKI_URL is required}
      LOKI_USER_ID: ${LOKI_USER_ID?LOKI_USER_ID is required}
      LOKI_API_TOKEN: ${LOKI_API_TOKEN?LOKI_API_TOKEN is required}
    command: run /etc/alloy/config.alloy
    restart: unless-stopped

volumes:
  mysql_data:
  certbot_certs:
  certbot_webroot:
