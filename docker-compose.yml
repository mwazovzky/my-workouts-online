services:
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: app-dev
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8080}:80"
    env_file:
      - .env
    environment:
      PHP_FPM_UPSTREAM: ${PHP_FPM_UPSTREAM:-app:9000}
      APP_ROOT: /var/www/html/public
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      start_period: 30s
      retries: 10

  node:
    image: node:20-alpine
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/var/www/html
      - node_modules:/var/www/html/node_modules
    command: >
      sh -lc 'if [ ! -d node_modules ] || [ -z "$(ls -A node_modules 2>/dev/null)" ]; then npm ci; fi; npm run dev -- --host 0.0.0.0 --port 5173'

volumes:
  mysql_data:
  node_modules:
