services:
  nginx:
    image: nginx:alpine
    container_name: workouts_nginx
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - workouts
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: workouts_app
    volumes:
      - ./:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - workouts
    restart: unless-stopped

  vite:
    image: node:22-alpine
    container_name: workouts_vite
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - 5173:5173
    command: npm run dev -- --host 0.0.0.0
    networks:
      - workouts

  mysql:
    image: mysql:8.4
    container_name: workouts_mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - 3306:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 60s  #
    networks:
      - workouts
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  workouts:
    driver: bridge
